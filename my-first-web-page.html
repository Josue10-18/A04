<!DOCTYPE html>
<!-- This tells the browser the document type is HTML5 -->

<html lang="en">
<!-- The <html> tag wraps all the content of the page and 'lang="en"' specifies the language is English -->

<head>
    <!-- The <head> contains metadata and information about the webpage -->
    <meta charset="UTF-8">
    <!-- This sets the character encoding so the page can display text correctly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the page responsive on different devices -->
    <title>My First Web Page</title>
    <!-- The title that will appear in the browser tab -->
</head>

<body>
<!-- The <body> contains everything visible on the webpage -->

<h1>Username: jxo</h1>
<!-- This is a heading displaying the username -->

<h2>Course Name: Introduction to Website Development</h2>
<!-- This heading displays the course name -->

<h3>Course Number and Section: IS117-Section 005</h3>
<!-- This heading displays the course number and section -->

<footer>
    <!-- The <footer> section is placed at the bottom of the webpage -->
    <p>&copy; Josue Ortiz - Due Date: 09/14/2025</p>
    <!-- The &copy; symbol adds a copyright mark -->
</footer>

</body>
</html>
